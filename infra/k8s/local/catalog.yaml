apiVersion: v1
kind: ConfigMap
metadata:
  name: catalog-service
  namespace: kosmos
data:
  APP_ENV: production
  APP_NAME: catalog-service
  APP_DEBUG: "false"
  LOG_LEVEL: INFO
  GCP_PROJECT_ID: local-kosmos
  PUBSUB_TOPIC_ID: catalog-events
  PUBSUB_EMULATOR_HOST: host.docker.internal:8085
  IAM_JWKS_URL: http://iam-service:8000/.well-known/jwks.json
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service
  namespace: kosmos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog-service
  template:
    metadata:
      labels:
        app: catalog-service
    spec:
      containers:
        - name: catalog-service
          image: kosmos/catalog-service:lab003
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8001
          envFrom:
            - configMapRef:
                name: catalog-service
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: catalog-service
                  key: DATABASE_URL
          readinessProbe:
            httpGet:
              path: /api/v1/catalog/products
              port: http
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-service
  namespace: kosmos
spec:
  selector:
    app: catalog-service
  ports:
    - name: http
      port: 8001
      targetPort: http
